version: "3.7"

services:
  server:
    image: libretranslate/libretranslate:v1.9.5
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data:rw
    environment:
      - TZ=${TZ:-UTC}
      - LT_HOST=127.0.0.1
    labels:
      yantr.app: "madutxo-libretranslate"
      yantr.service: "LibreTranslate Server"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3