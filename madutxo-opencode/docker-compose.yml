version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: madutxo-opencode_server_1
      APP_PORT: 4096

  server:
    image: ghcr.io/anomalyco/opencode:latest
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      HOME: /data
    restart: on-failure
    stop_grace_period: 1m

volumes:
  data: