version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: madutxo-opencode_app_1
    depends_on:
      - app

  app:
    image: ghcr.io/anomalyco/opencode:1.4.6
    user: "1000:1000"
    init: true
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    volumes:
      - ${APP_DATA_DIR}/data:/home/opencode/
    environment:
      HOME: /home/opencode
    restart: on-failure
    stop_grace_period: 1m

volumes:
  data:
