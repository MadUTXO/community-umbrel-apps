version: "3.7"

services:
  app_proxy:
    depends_on:
      - server
    environment:
      APP_HOST: madutxo-opencode_server_1
      APP_PORT: 4096

  server:
    image: ghcr.io/anomalyco/opencode:latest
    user: "1000:1000"
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      HOME: /data
      BUN_CONFIG_HOME: /data/.bun
      BUN_INSTALL_CACHE_DIR: /data/.bun-cache
    restart: on-failure
    stop_grace_period: 1m

volumes:
  data: