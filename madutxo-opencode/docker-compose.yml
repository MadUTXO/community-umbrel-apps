services:
  app_proxy:
    environment:
      APP_HOST: madutxo-opencode_server_1
      APP_PORT: 4096
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/anomalyco/opencode:latest@sha256:0e5a369b6747dd322001e3719564988db3cbcb0482bea468ff8091895c90d810
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    environment:
      HOME: /home/opencode
      TZ: ${TZ:-UTC}
      OPENCODE_SERVER_PASSWORD: ${APP_PASSWORD}
      BUN_CONFIG_HOME: /home/opencode/.bun
      BUN_INSTALL_CACHE_DIR: /home/opencode/.bun-cache
    volumes:
      - ${APP_DATA_DIR}/data:/home/opencode:rw
