version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ${APP_MADUTXO_NOSTR_VPN_IP}
      APP_PORT: ${APP_MADUTXO_NOSTR_VPN_PORT}
      PROXY_AUTH_ADD: "false"

  server:
    init: true
    image: ghcr.io/madutxo/nostr-vpn:0.3.4@sha256:3074cda0a72fcef8f5a7764841f63b0ab3d0b1de8e1f7ad47ca3448fae465b83
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    labels:
      yantr.app: "madutxo-nostr-vpn"
      yantr.service: "VPN Service"
    volumes:
      - ${APP_DATA_DIR}/data:/data:rw
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun:rwm
    environment:
      - NVPN_DATA_DIR=/data
      - HOME=/data
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3