description: >-
  Hermes Agent is an AI agent that gets better the more you use it by 
  creating its own skills, storing user preferences, and updating its memory.
  
  On Umbrel, it opens in a browser terminal with a guided first-run setup. 
  Pick your provider and model, then keep working from the same place every time.
  
  Use Hermes Agent to browse the web, edit files, run shell commands, connect 
  services like Telegram, Signal, WhatsApp, and Discord, save reusable skills, 
  and remember important details across sessions.
