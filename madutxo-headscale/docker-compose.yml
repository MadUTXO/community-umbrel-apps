version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: madutxo-headscale_headplane_1
      APP_PORT: 3000

  headscale:
    build:
      context: .
      dockerfile: Dockerfile
    user: "1000:1000"
    init: true
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
      - ${APP_DATA_DIR}/config:/etc/headscale:rw
    command: serve

  headplane:
    image: ghcr.io/tale/headplane:latest
    user: "1000:1000"
    init: true
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
    environment:
      - TZ=${TZ:-UTC}
      - HEADSCALE_URL=http://127.0.0.1:8080
      - HEADSCALE_API_KEY_FILE=/var/lib/headscale/api_key.txt
      - SERVER_COOKIE_SECRET_FILE=/var/lib/headscale/cookie_secret
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
