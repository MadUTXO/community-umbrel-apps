version: '3.7'

services:
  main:
    image: hwdsl2/headscale-server:latest
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
    environment:
      - TZ=${TZ:-UTC}
      - HS_SERVER_URL=${HS_SERVER_URL:-http://192.168.1.1:8080}
      - HS_LISTEN_PORT=8080
      - HS_METRICS_PORT=9090
      - HS_BASE_DOMAIN=headscale.internal
      - HS_USERNAME=admin
      - HS_DNS_SRV1=1.1.1.1
      - HS_DNS_SRV2=1.0.0.1
      - HS_LOG_LEVEL=error
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        KEY_FILE="/var/lib/headscale/api_key.txt"
        HTML_FILE="/var/lib/headscale/setup.html"
        
        if [ ! -f "$KEY_FILE" ]; then
          /opt/src/run.sh &
          HS_PID=$!
          for i in $(seq 1 30); do
            [ -S /var/run/headscale/headscale.sock ] && break
            sleep 1
          done
          sleep 3
          KEY=$(headscale -c /etc/headscale/config.yaml apikeys create --expiration 8760h 2>&1 | grep -oP 'Key: \K[^\s]+' || echo "")
          if [ -n "$KEY" ]; then
            echo "$KEY" > "$KEY_FILE" && chmod 600 "$KEY_FILE"
            cat > "$HTML_FILE" << EOF
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Headscale Setup</title>
  <style>
    body{font-family:sans-serif;max-width:450px;margin:40px auto;padding:20px;background:#0f0f23;color:#eee}
    .box{background:#1a1a2e;padding:24px;border-radius:12px}
    h1{color:#00d4ff;margin-top:0}
    .k{background:#0f3460;padding:14px;border-radius:8px;font-family:monospace;word-break:break-all;margin:14px 0}
    .b{background:#00d4ff;color:#0f0f23;padding:12px;border:none;border-radius:6px;cursor:pointer;width:100%}
    .w{background:#ff6b6b20;border-left:3px solid #ff6b6b;padding:12px;margin-top:14px;font-size:13px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Headscale Setup</h1>
    <p>Copy key → paste in Web UI (port 8083)</p>
    <div class="k" id="k">$KEY</div>
    <button class="b" onclick="done()">Copy Key</button>
    <div class="w" id="w">⚠️ Key DELETED after copy!</div>
  </div>
  <script>
    function done(){
      navigator.clipboard.writeText(document.getElementById('k').textContent);
      document.querySelector('.b').textContent='✓ Copied!';
      fetch('/delete',{method:'POST'});
      setTimeout(()=>{
        document.getElementById('k').textContent='[DELETED]';
        document.getElementById('w').style.display='none';
      },2000);
    }
  </script>
</body>
</html>
EOF
          fi
          wait $HS_PID
        else
          exec /opt/src/run.sh
        fi

  ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    environment:
      - TZ=${TZ:-UTC}
      - HTTP_PORT=8083
      - HTTPS_PORT=8445
    labels:
      yantr.app: "madutxo-headscale"
      yantr.service: "Web UI"

  setup:
    image: python:3.11-alpine
    restart: "no"
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data:rw
    command: >
      sh -c "
        pip install -q bottle 2>/dev/null
        python3 << 'PY'
        import os
        from bottle import route, run, static_file, abort
        
        DATA = '/data'
        
        @route('/')
        def index(): return static_file('setup.html', root=DATA)
        @route('/<f>')  
        def files(f):
          if f == 'api_key.txt': abort(404)
          return static_file(f, root=DATA)
        @route('/delete', method='POST')
        def delk():
          try:
            if os.path.exists(f'{DATA}/api_key.txt'):
              os.remove(f'{DATA}/api_key.txt')
          except: pass
          return ''
        
        print('Setup: http://127.0.0.1:8084')
        run(host='127.0.0.1', port=8084, debug=False)
        PY
      "
    labels:
      yantr.app: "madutxo-headscale"
      yantr.service: "Setup"
