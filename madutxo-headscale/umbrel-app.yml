manifestVersion: 1
id: madutxo-headscale
category: networking
name: Headscale
icon: https://raw.githubusercontent.com/MadUTXO/community-umbrel-apps/master/madutxo-headscale/icon.png
version: "v0.28.0"
tagline: Open source Tailscale control server
description: >-
  Headscale is an open source implementation of the Tailscale control server.
  Run your own VPN server using the official Tailscale clients.


  Setup (first time):
  1. Open setup page at http://YOUR_IP:8084
  2. Click "Copy" to copy the API key
  3. Open Web UI at http://YOUR_IP:8083
  4. Enter API URL: http://YOUR_IP:8080
  5. Paste the API key
  6. Create a pre-auth key in Web UI to connect devices


  Connect a device:
  tailscale up --login-server http://YOUR_IP:8080 --authkey <pre-auth-key>
