version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: madutxo-orchard_orchard_1
      APP_PORT: 3321

  orchard:
    image: ghcr.io/cashubtc/orchard-mintdb-sqlite:latest
    user: "1000:1000"
    init: true
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "3321:3321"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
      - ${APP_BITCOIN_DATA_DIR}:/bitcoin:ro
    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      SERVER_HOST: 0.0.0.0
      SETUP_KEY: ${APP_SEED:-orchardkey}
      DATABASE_DIR: /app/data
      MINT_RPC_MTLS: "false"
      # Bitcoin Core (required)
      BITCOIN_TYPE: core
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      # Lightning (optional - only if lightning app is installed)
      LIGHTNING_TYPE: ${APP_LIGHTNING_NODE_IP:+lnd}
      LIGHTNING_RPC_HOST: ${APP_LIGHTNING_NODE_IP:-}
      LIGHTNING_RPC_PORT: ${APP_LIGHTNING_NODE_PORT:-}
      LIGHTNING_REST_PORT: ${APP_LIGHTNING_NODE_REST_PORT:-}
      LIGHTNING_MACAROON: ${APP_LIGHTNING_NODE_IP:+//lnd/data/chain/bitcoin/${APP_BITCOIN_NETWORK}/admin.macaroon}
      LIGHTNING_CERT: ${APP_LIGHTNING_NODE_IP:+//lnd/tls.cert}
    tmpfs:
      - /app/data/tmp

volumes:
  data:
