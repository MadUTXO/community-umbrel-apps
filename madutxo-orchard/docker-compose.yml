version: "3.7"

services:
  app_proxy:
    depends_on:
      - web
    environment:
      APP_HOST: madutxo-orchard_web_1
      APP_PORT: 3321
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/cashubtc/orchard-mintdb-sqlite:1.8.0
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      TZ: ${TZ:-UTC}
      SETUP_KEY: ${APP_SEED:-default-orchard-secret-key-change-in-production}
      NODE_ENV: production
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "3321"
      DOCKER_ENV: "true"
      DATABASE_DIR: /app/data
      MINT_DATANAME: mint.sqlite3
      MINT_DATADIR: /app/data
      MINT_RPC_MTLS: "false"

volumes:
  data:
